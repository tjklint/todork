name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # required for gh release create / upload / edit

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create GitHub Release (draft)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create draft release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build – ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            use-cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            use-cross: true
          - os: macos-15
            target: x86_64-apple-darwin
            use-cross: false
          - os: macos-15
            target: aarch64-apple-darwin
            use-cross: false
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --locked --release --target ${{ matrix.target }}
          else
            cargo build --locked --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Linux / macOS)
        if: matrix.os != 'windows-2025'
        run: strip target/${{ matrix.target }}/release/todork

      - name: Package binary (Linux / macOS)
        if: matrix.os != 'windows-2025'
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE="todork-${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/todork todork
          tar czf "${ARCHIVE}" todork
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Package binary (Windows)
        if: matrix.os == 'windows-2025'
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $ARCHIVE = "todork-${VERSION}-${{ matrix.target }}.zip"
          Copy-Item "target\${{ matrix.target }}\release\todork.exe" "todork.exe"
          Compress-Archive -Path "todork.exe" -DestinationPath $ARCHIVE
          $Hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "${Hash}  ${ARCHIVE}" | Out-File -Encoding ASCII "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ env.ARCHIVE }}" \
            "${{ env.ARCHIVE }}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
