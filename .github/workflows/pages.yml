name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:   # allow manual re-deploys from the Actions tab

# Grant the GITHUB_TOKEN the permissions required by deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress so a
# partial deploy isn't left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────
  build:
    name: Build Qwik site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: website
        run: bun install

      - name: Build static site
        working-directory: website
        run: bun run build

      # Vite outputs under dist/todork/ because base='/todork/'.
      # The Pages artifact root maps to https://tjklint.github.io/todork/,
      # so upload the subdirectory directly to avoid a /todork/todork/ double prefix.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist/todork

  # ── 2. Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
