name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:   # allow manual re-deploys from the Actions tab

# Grant the GITHUB_TOKEN the permissions required by deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress so a
# partial deploy isn't left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────
  build:
    name: Build Qwik site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build static site
        working-directory: website
        run: npm run build

      # The static adapter outputs to website/dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  # ── 2. Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
